<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 목록</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9f0f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background-color: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            text-align: center;
        }

        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4a90e2;
            color: #ffffff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #357ab8;
        }

        .table-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 15px 10px;
            text-align: center;
            font-size: 14px;
            word-wrap: break-word;
        }

        th {
            background-color: #4a90e2;
            color: #ffffff;
            font-weight: bold;
        }

        td {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
        }

        .empty-message {
            font-size: 14px;
            color: #666;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body onload="loadInventory()">
    <div class="container">
        <a href="javascript:history.back()" class="back-button">뒤로가기</a>
        <div class="header">재고 목록</div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>품목 ID</th>
                        <th>업체명</th>
                        <th>부품 타입</th>
                        <th>품명</th>
                        <th>수량</th>
                        <th>총 가격</th>
                        <th>입고 날짜</th>
                    </tr>
                </thead>
                <tbody id="inventory-table">
                    <tr>
                        <td colspan="7" class="empty-message">데이터를 불러오는 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadInventory() {
            const tableBody = document.getElementById("inventory-table");

            try {
                const response = await fetch("/api/inventory/getItems");
                const data = await response.json();

                if (!data.success) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">${data.error}</td></tr>`;
                    return;
                }

                if (data.items.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">현재 재고가 없습니다.</td></tr>`;
                } else {
                    tableBody.innerHTML = "";
                    data.items.forEach((item) => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${item.item_id}</td>
                            <td>${item.supply}</td>
                            <td>${item.type || "미등록"}</td>
                            <td>${item.name || "미등록"}</td>
                            <td>${item.quantity}</td>
                            <td>${item.total_price.toLocaleString()}원</td>
                            <td>${new Date(item.purchase_date).toLocaleDateString()}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
            }
        }
    </script>
</body>
</html>
