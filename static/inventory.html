<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 관리 상세 보기</title>
    <style>
        /* 전체적인 페이지 설정 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* UI 전체를 감싸는 컨테이너 */
        .container {
            width: 80%;
            max-width: 900px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 20px;
        }

        /* 제목 섹션 */
        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: left;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        /* 세부 정보 그리드 레이아웃 */
        .details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            margin-bottom: 20px;
        }

        /* 각 입력 영역 스타일 */
        .details div {
            display: flex;
            flex-direction: column;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        /* 입력 항목 레이블 */
        .details label {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        /* 입력 필드 스타일 */
        .details input, .details select {
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            box-sizing: border-box;
        }

        /* 테이블 스타일 */
        .table-container {
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* 테이블 헤더 스타일 */
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f0f0f0;
        }

        /* 하단 저장 및 취소 버튼 스타일 */
        .footer {
            margin-top: 20px;
            text-align: right;
        }

        .button {
            background-color: #4a90e2;
            color: #ffffff;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        /* 버튼 호버 효과 */
        .button:hover {
            background-color: #357ab8;
        }
    </style>
</head>
<body>

    <!-- 메인 컨테이너 시작 -->
    <div class="container">
        <!-- 판매 관리 제목 -->
        <div class="header">재고 관리</div>

        <!-- 세부 정보 영역 -->
        <div class="details">
            <!-- 업체명 입력 -->
            <div>
                <label>업체명</label>
                <input type="text" value="서울대학교" readonly>
            </div>

            <!-- 거래금 입력 -->
            <div>
                <label>거래금</label>
                <input type="number" value="0" readonly>
            </div>

            <!-- 상태구분 선택 -->
            <div>
                <label>상태구분</label>
                <select>
                    <option>미완료</option>
                    <option>완료</option>
                </select>
            </div>

            <!-- 배송지 입력 -->
            <div>
                <label>배송지</label>
                <input type="text" value="쌍샘로 11-16" readonly>
            </div>

            <!-- 전화 번호 입력 -->
            <div>
                <label>전화 번호</label>
                <input type="text" value="010-1234-5678" readonly>
            </div>

            <!-- 주문 날짜 입력 -->
            <div>
                <label>주문 날짜</label>
                <input type="date" value="2024-09-13" readonly>
            </div>
        </div>

        <!-- 거래 내역 테이블 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>순번</th>
                        <th>품명</th>
                        <th>가격</th>
                        <th>수량</th>
                        <th>업체명</th>
                        <th>비고</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>모니터</td>
                        <td>80,000</td>
                        <td>23</td>
                        <td>서울대학교</td>
                        <td>-</td>
                    </tr>
                    <!-- 추가 항목 필요 시 추가 가능 -->
                </tbody>
            </table>
        </div>

        <!-- 하단 버튼 영역 -->
        <div class="footer">
            <button class="button">저장</button>
            <button class="button">취소</button>
        </div>
    </div>
    <!-- 메인 컨테이너 끝 -->

</body>
</html>
