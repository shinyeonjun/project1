<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 목록</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9f0f5;
            margin: 0;
            padding: 0;
            /* 화면 전체를 Flex 컨테이너로 설정 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 수직 가운데 정렬을 위해 최소 높이 설정 */
        }

        .container {
            width: 90%;
            max-width: 1200px; /* 최대 너비 확장 */
            background-color: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            /* 화면에 따라 스크롤이 필요한 경우를 위해 최대 높이 설정 */
            max-height: 90vh;
            overflow: auto; /* 내용이 넘칠 경우 스크롤 */
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            text-align: center;
        }

        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4a90e2;
            color: #ffffff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #357ab8;
        }

        .table-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 고정 레이아웃 사용 */
        }

        th, td {
            padding: 15px 10px;
            text-align: center;
            font-size: 14px;
            word-wrap: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            background-color: #4a90e2;
            color: #ffffff;
            font-weight: bold;
        }

        td {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
        }

        /* 품명 컬럼 스타일 */
        th:nth-child(4), td:nth-child(4) { /* '품명' 컬럼 */
            width: 25%; /* 필요에 따라 조정 */
            white-space: normal; /* 줄 바꿈 허용 */
            word-break: break-word; /* 단어 단위로 분리 */
        }

        .empty-message {
            font-size: 14px;
            color: #666;
            padding: 20px;
            text-align: center;
        }

        /* 버튼 공통 스타일 */
        .button {
            background-color: #4a90e2;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        /* 구매 요청 버튼 */
        .large-button {
            padding: 12px 24px;
            font-size: 16px;
        }

        .large-button:hover {
            background-color: #357ab8;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            flex-wrap: wrap; /* 버튼이 화면 크기에 따라 줄 바꿈 */
            gap: 10px;
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 10px 5px;
            }

            .header {
                font-size: 20px;
            }

            .back-button {
                padding: 6px 12px;
                font-size: 12px;
            }

            .button-container {
                flex-direction: column;
                align-items: stretch;
            }

            .large-button {
                width: 100%;
            }

            /* 품명 컬럼 폰트 크기 조정 */
            th:nth-child(4), td:nth-child(4) {
                font-size: 12px;
            }
        }
    </style>
</head>
<body onload="loadInventory()">
    <div class="container">
        <a href="javascript:history.back()" class="back-button">뒤로가기</a>
        <div class="header">재고 목록</div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>품목 ID</th>
                        <th>업체명</th>
                        <th>부품 타입</th>
                        <th>품명</th>
                        <th>수량</th>
                        <th>단가</th>
                        <th>총 가격</th>
                    </tr>
                </thead>
                <tbody id="inventory-table">
                    <tr>
                        <td colspan="7" class="empty-message">데이터를 불러오는 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadInventory() {
            const tableBody = document.getElementById("inventory-table");

            try {
                const response = await fetch("/api/inventory/getItems");
                const data = await response.json();

                if (!data.success) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">${data.error}</td></tr>`;
                    return;
                }

                if (data.items.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">현재 재고가 없습니다.</td></tr>`;
                } else {
                    tableBody.innerHTML = "";
                    data.items.forEach((item) => {
                        // 총 가격 계산: 단가 * 수량
                        const totalPrice = item.price * item.quantity;

                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${item.item_id}</td>
                            <td>${item.supply || "미등록"}</td>
                            <td>${item.type || "미등록"}</td>
                            <td>${item.name || "미등록"}</td>
                            <td>${item.quantity}</td>
                            <td>${parseFloat(item.price).toLocaleString()}원</td>
                            <td>${parseFloat(totalPrice).toLocaleString()}원</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
            }
        }
    </script>
</body>
</html>
