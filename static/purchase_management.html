<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구매 요청 관리</title>
    <style>
        /* 전체적인 페이지 설정 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 위쪽 정렬 */
            min-height: 100vh;
        }

        /* UI 전체를 감싸는 컨테이너 */
        .container {
            width: 95%;
            max-width: 1400px; /* 최대 너비를 늘려 더 많은 공간 확보 */
            background-color: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 30px;
            margin: 20px;
            position: relative;
            overflow-x: auto; /* 가로 스크롤 추가 */
        }

        /* 제목 섹션 */
        .header {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            color: #333;
            text-align: center;
        }

        /* 뒤로가기 버튼 스타일 */
        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4a90e2;
            color: #ffffff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #357ab8;
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            table-layout: auto; /* 자동 레이아웃 사용 */
            min-width: 1300px; /* 최소 너비 설정을 늘려 버튼 공간 확보 */
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
            font-size: 15px;
            border-bottom: 1px solid #e0e0e0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap; /* 한 줄로 표시 */
        }

        th {
            background-color: #f8f9fb;
            font-weight: 600;
            color: #4a4a4a;
            border-top: 2px solid #d1d1d1;
            border-bottom: 2px solid #d1d1d1;
        }

        tr:nth-child(even) td {
            background-color: #fafbfc;
        }

        tr:hover td {
            background-color: #eef3f7;
        }

        /* 특정 열 너비 설정 */
        th:nth-child(1), td:nth-child(1) { /* 업체명 */
            width: 15%;
        }
        th:nth-child(2), td:nth-child(2) { /* 부품 타입 */
            width: 12%;
        }
        th:nth-child(3), td:nth-child(3) { /* 품명 */
            width: 18%;
        }
        th:nth-child(4), td:nth-child(4) { /* 거래금 */
            width: 10%;
        }
        th:nth-child(5), td:nth-child(5) { /* 상태 */
            width: 10%;
        }
        th:nth-child(6), td:nth-child(6) { /* 배송지 */
            width: 18%;
        }
        th:nth-child(7), td:nth-child(7) { /* 전화번호 */
            width: 12%;
        }
        th:nth-child(8), td:nth-child(8) { /* 주문 날짜 */
            width: 8%;
        }
        th:nth-child(9), td:nth-child(9) { /* 수량 */
            width: 5%;
        }
        th:nth-child(10), td:nth-child(10) { /* 승인 */
            width: 7%;
        }
        th:nth-child(11), td:nth-child(11) { /* 반려 */
            width: 7%;
        }

        /* 액션 버튼 스타일 */
        .button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            transition: background-color 0.3s ease;
            min-width: 80px;
            display: inline-block;
        }

        .approve-button {
            background-color: #4caf50;
        }

        .approve-button:hover {
            background-color: #388e3c;
        }

        .reject-button {
            background-color: #f44336;
        }

        .reject-button:hover {
            background-color: #d32f2f;
        }

        /* 버튼 컨테이너 스타일 */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        /* 데이터 없음 메시지 */
        .no-data-message {
            font-size: 18px;
            color: #888;
            text-align: center;
            padding: 30px 0;
        }

        /* 사용자 메시지 */
        .message {
            margin-top: 20px;
            color: #4a90e2;
            font-weight: bold;
            text-align: center;
        }

        /* 반응형 디자인 */
        @media (max-width: 1400px) {
            .container {
                max-width: 1200px; /* 반응형 너비 조정 */
            }
        }

        @media (max-width: 1300px) {
            table {
                min-width: 1200px; /* 최소 너비 조정 */
            }
        }

        @media (max-width: 1200px) {
            th:nth-child(1), td:nth-child(1) { /* 업체명 */
                width: 18%;
            }
            th:nth-child(2), td:nth-child(2) { /* 부품 타입 */
                width: 14%;
            }
            th:nth-child(3), td:nth-child(3) { /* 품명 */
                width: 20%;
            }
            th:nth-child(4), td:nth-child(4) { /* 거래금 */
                width: 12%;
            }
            th:nth-child(5), td:nth-child(5) { /* 상태 */
                width: 10%;
            }
            th:nth-child(6), td:nth-child(6) { /* 배송지 */
                width: 20%;
            }
            th:nth-child(7), td:nth-child(7) { /* 전화번호 */
                width: 14%;
            }
            th:nth-child(8), td:nth-child(8) { /* 주문 날짜 */
                width: 8%;
            }
            th:nth-child(9), td:nth-child(9) { /* 수량 */
                width: 5%;
            }
            th:nth-child(10), td:nth-child(10) { /* 승인 */
                width: 8%;
            }
            th:nth-child(11), td:nth-child(11) { /* 반려 */
                width: 8%;
            }
        }

        @media (max-width: 992px) {
            th:nth-child(1), td:nth-child(1) { /* 업체명 */
                width: 20%;
            }
            th:nth-child(2), td:nth-child(2) { /* 부품 타입 */
                width: 16%;
            }
            th:nth-child(3), td:nth-child(3) { /* 품명 */
                width: 22%;
            }
            th:nth-child(4), td:nth-child(4) { /* 거래금 */
                width: 14%;
            }
            th:nth-child(5), td:nth-child(5) { /* 상태 */
                width: 10%;
            }
            th:nth-child(6), td:nth-child(6) { /* 배송지 */
                width: 22%;
            }
            th:nth-child(7), td:nth-child(7) { /* 전화번호 */
                width: 16%;
            }
            th:nth-child(8), td:nth-child(8) { /* 주문 날짜 */
                width: 8%;
            }
            th:nth-child(9), td:nth-child(9) { /* 수량 */
                width: 5%;
            }
            th:nth-child(10), td:nth-child(10) { /* 승인 */
                width: 10%;
            }
            th:nth-child(11), td:nth-child(11) { /* 반려 */
                width: 10%;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header {
                font-size: 20px;
            }

            .back-button {
                padding: 6px 12px;
                font-size: 12px;
                top: 10px;
                right: 10px;
            }

            th, td {
                font-size: 12px;
                padding: 8px 10px;
                white-space: nowrap;
            }

            .button {
                padding: 6px 10px;
                font-size: 12px;
                min-width: 70px;
            }

            .button-container {
                gap: 5px;
            }
        }

        @media (max-width: 576px) {
            .container {
                width: 100%;
                max-width: none;
                border-radius: 0;
                box-shadow: none;
            }

            table {
                min-width: 1000px; /* 최소 너비 줄이기 */
            }

            th, td {
                padding: 8px 5px;
                font-size: 12px;
            }

            .approve-button, .reject-button {
                padding: 6px 10px;
                font-size: 12px;
                min-width: unset;
            }
        }
    </style>
</head>
<body onload="fetchRequests()">
    <div class="container">
        <div class="header">구매 요청 관리</div>
        <button class="back-button" onclick="goBack()">뒤로가기</button>
        <table>
            <thead>
                <tr>
                    <th>업체명</th>
                    <th>부품 타입</th>
                    <th>품명</th>
                    <th>거래금</th>
                    <th>상태</th>
                    <th>배송지</th>
                    <th>전화번호</th>
                    <th>주문 날짜</th>
                    <th>수량</th>
                    <th>승인</th>
                    <th>반려</th>
                </tr>
            </thead>
            <tbody id="request-table"></tbody>
        </table>
        <div id="no-data-message" class="no-data-message" style="display: none;">요청 없음</div>
        <div id="message" class="message"></div>
    </div>

    <script>
        // 뒤로가기 함수
        function goBack() {
            window.history.back();
        }

        // 구매 요청 가져오기
        async function fetchRequests() {
            try {
                const response = await fetch('/api/purchase_management/getRequests');
                const result = await response.json();

                if (!result.success || result.requests.length === 0) {
                    document.getElementById("no-data-message").style.display = "block";
                    document.getElementById("request-table").innerHTML = "";
                } else {
                    document.getElementById("no-data-message").style.display = "none";
                    populateTable(result.requests);
                }
            } catch (error) {
                console.error("Error fetching requests:", error);
                document.getElementById("message").textContent = "요청 데이터를 불러오는 데 문제가 발생했습니다.";
            }
        }

        // 테이블 채우기
        function populateTable(requests) {
            const tableBody = document.getElementById("request-table");
            tableBody.innerHTML = "";

            requests.forEach(request => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td title="${escapeHtml(request.supply)}">${truncateText(request.supply, 15)}</td>
                    <td title="${escapeHtml(request.type || '미등록')}">${truncateText(request.type || "미등록", 12)}</td>
                    <td title="${escapeHtml(request.name || '미등록')}">${truncateText(request.name || "미등록", 18)}</td>
                    <td title="${formatPrice(request.total_price)}">${formatPrice(request.total_price)}</td>
                    <td title="${getStatusText(request.status)}">${getStatusText(request.status)}</td>
                    <td title="${escapeHtml(request.deliveryaddress || '미등록')}">${truncateText(request.deliveryaddress || "미등록", 20)}</td>
                    <td title="${escapeHtml(request.phone_number || '미등록')}">${truncateText(request.phone_number || "미등록", 15)}</td>
                    <td title="${formatDate(request.purchase_date)}">${formatDate(request.purchase_date)}</td>
                    <td title="${request.quantity || '0'}">${request.quantity}</td>
                    <td>
                        <div class="button-container">
                            <button class="button approve-button" onclick="updateStatus(${request.purchase_id}, 1)">승인</button>
                        </div>
                    </td>
                    <td>
                        <div class="button-container">
                            <button class="button reject-button" onclick="updateStatus(${request.purchase_id}, 2)">반려</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // 텍스트 자르기 함수 (긴 텍스트 처리)
        function truncateText(text, maxLength) {
            if (text.length > maxLength) {
                return text.substring(0, maxLength) + '...';
            }
            return text;
        }

        // 날짜 포맷 함수
        function formatDate(dateString) {
            if (!dateString) return "미등록";
            const date = new Date(dateString);
            if (isNaN(date)) return "미등록";
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            return date.toLocaleDateString('ko-KR', options);
        }

        // 가격 포맷 함수
        function formatPrice(price) {
            if (price === undefined || price === null) price = 0;
            return `${Number(price).toLocaleString()}원`;
        }

        // 상태 텍스트 변환 함수
        function getStatusText(status) {
            switch(status) {
                case 0:
                    return "대기 중";
                case 1:
                    return "승인됨";
                case 2:
                    return "반려됨";
                default:
                    return "알 수 없음";
            }
        }

        // 주문 상태 업데이트 함수
        async function updateStatus(purchaseId, status) {
            const endpoint = status === 1 ? "/api/purchase_management/approve" : "/api/purchase_management/reject";
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ purchase_id: purchaseId })
                });
                const result = await response.json();

                if (result.success) {
                    document.getElementById("message").textContent = "요청이 성공적으로 처리되었습니다.";
                    fetchRequests(); // 테이블 데이터 갱신
                } else {
                    document.getElementById("message").textContent = "요청 처리에 실패했습니다.";
                }
            } catch (error) {
                console.error("Error updating status:", error);
                document.getElementById("message").textContent = "상태 업데이트 중 오류가 발생했습니다.";
            }
        }

        // HTML 이스케이프 함수 (보안 강화)
        function escapeHtml(text) {
            if (typeof text !== 'string') return text;
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // 페이지 로드 시 요청 가져오기
        window.onload = fetchRequests;
    </script>
</body>
</html>
