<!-- order_management.html -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 요청 관리</title>
    <style>
        /* 기존 스타일 유지 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            background-color: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 30px;
            margin: 20px;
            position: relative;
            max-height: 90vh;
            overflow: auto; /* 내용이 넘칠 경우 스크롤 */
        }
        .header {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            color: #333;
            text-align: center;
        }
        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4a90e2;
            color: #ffffff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }
        .back-button:hover {
            background-color: #357ab8;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 10px;
            table-layout: fixed; /* 고정 레이아웃 사용 */
        }
        th, td {
            padding: 12px 15px;
            text-align: center;
            font-size: 15px;
            border-bottom: 1px solid #e0e0e0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        th {
            background-color: #f8f9fb;
            font-weight: 600;
            color: #4a4a4a;
            border-top: 2px solid #d1d1d1;
            border-bottom: 2px solid #d1d1d1;
        }
        tr:nth-child(even) td {
            background-color: #fafbfc;
        }
        tr:hover td {
            background-color: #eef3f7;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            transition: background-color 0.3s ease;
        }
        .approve-button {
            background-color: #4caf50;
        }
        .approve-button:hover {
            background-color: #388e3c;
        }
        .reject-button {
            background-color: #f44336;
        }
        .reject-button:hover {
            background-color: #d32f2f;
        }
        .no-data-message {
            font-size: 18px;
            color: #888;
            text-align: center;
            padding: 30px 0;
        }
        .message {
            margin-top: 20px;
            color: #4a90e2;
            font-weight: bold;
            text-align: center;
        }
        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 10px 5px;
            }
            .header {
                font-size: 20px;
            }
            .back-button {
                padding: 6px 12px;
                font-size: 12px;
            }
            .action-buttons {
                flex-direction: column;
                gap: 5px;
            }
            .button {
                width: 100%;
                padding: 8px 0;
            }
        }
    </style>
</head>
<body onload="fetchOrders()">
    <div class="container">
        <div class="header">주문 요청 관리</div>
        <button class="back-button" onclick="goBack()">뒤로가기</button>
        <table>
            <thead>
                <tr>
                    <th>주문 ID</th>
                    <th>고객명</th>
                    <th>주문 날짜</th>
                    <th>상태</th>
                    <th>총 금액</th>
                    <th>배송지</th>
                    <th>전화번호</th>
                    <th>액션</th>
                </tr>
            </thead>
            <tbody id="order-table"></tbody>
        </table>
        <div id="no-data-message" class="no-data-message" style="display: none;">요청 없음</div>
        <div id="message" class="message"></div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        async function fetchOrders() {
            try {
                const response = await fetch('/api/order_management/getOrders');
                const result = await response.json();

                if (!result.success || result.orders.length === 0) {
                    document.getElementById("no-data-message").style.display = "block";
                    document.getElementById("order-table").innerHTML = "";
                } else {
                    document.getElementById("no-data-message").style.display = "none";
                    populateTable(result.orders);
                }
            } catch (error) {
                console.error("Error fetching orders:", error);
                document.getElementById("message").textContent = "주문 데이터를 불러오는 데 문제가 발생했습니다.";
            }
        }

        function populateTable(orders) {
            const tableBody = document.getElementById("order-table");
            tableBody.innerHTML = "";

            orders.forEach(order => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${order.order_id}</td>
                    <td>${order.customer_name || "미등록"}</td>
                    <td>${new Date(order.order_date).toLocaleDateString()}</td>
                    <td>${getStatusText(order.status)}</td>
                    <td>${order.total_price.toLocaleString()}원</td>
                    <td>${order.delivery_address || "미등록"}</td>
                    <td>${order.phone_number || "미등록"}</td>
                    <td class="action-buttons">
                        <button class="button approve-button" onclick="approveOrder(${order.order_id})">승인</button>
                        <button class="button reject-button" onclick="rejectOrder(${order.order_id})">반려</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function getStatusText(status) {
            switch(status) {
                case 0:
                    return "대기 중";
                case 1:
                    return "승인됨";
                case 2:
                    return "반려됨";
                default:
                    return "알 수 없음";
            }
        }

        async function approveOrder(orderId) {
            try {
                const response = await fetch('/api/order_management/approveOrder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId })
                });
                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById("message").textContent = "주문이 승인되었습니다.";
                    fetchOrders();
                } else {
                    alert(result.detail || "승인 중 오류가 발생했습니다.");
                }
            } catch (error) {
                console.error("Error approving order:", error);
                alert("주문 승인 중 오류가 발생했습니다.");
            }
        }

        async function rejectOrder(orderId) {
            if (!confirm("정말로 이 주문을 반려하시겠습니까?")) {
                return;
            }

            try {
                const response = await fetch('/api/order_management/rejectOrder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId })
                });
                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById("message").textContent = "주문이 반려되었습니다.";
                    fetchOrders();
                } else {
                    alert(result.detail || "반려 중 오류가 발생했습니다.");
                }
            } catch (error) {
                console.error("Error rejecting order:", error);
                alert("주문 반려 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
