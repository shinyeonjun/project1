<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구매 관리 상세 보기</title>
    <style>
        /* 전체적인 페이지 설정 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9f0f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* UI 전체를 감싸는 컨테이너 */
        .container {
            width: 80%;
            max-width: 850px;
            background-color: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 30px;
            position: relative;
            margin: 20px;
        }

        /* 제목 섹션 */
        .header {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: left;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            color: #333;
        }

        /* 버튼 스타일 */
        .button {
            background-color: #4a90e2;
            color: #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .button.disabled {
            pointer-events: none;
            background-color: #ccc;
            color: #666;
            opacity: 0.6;
        }

        /* 버튼 컨테이너 스타일 */
        .button-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            position: absolute;
            top: 20px;
            right: 30px;
        }

        /* 직급 표시 스타일 */
        .role-display {
            font-size: 14px;
            color: #555;
            margin-right: 15px;
            font-weight: bold;
        }

        /* 세부 정보 그리드 레이아웃 */
        .details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 15px;
            margin-bottom: 25px;
        }

        /* 각 입력 영역 스타일 */
        .details div {
            display: flex;
            flex-direction: column;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9fbfc;
        }

        /* 입력 항목 레이블 */
        .details label {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        /* 입력 필드 스타일 */
        .details input {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        .details input:focus {
            border-color: #4a90e2;
        }

        /* 테이블 스타일 */
        .table-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* 테이블 헤더 스타일 */
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        th {
            background-color: #f0f0f0;
            color: #333;
            font-weight: 600;
        }

        /* 하단 버튼 영역 스타일 */
        .row-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
    </style>
</head>
<body onload="checkRoleAccess()">
    <div class="container">
        <!-- 버튼 -->
        <div class="button-container">
            <span id="role-display" class="role-display"></span>
            <a href="purchase_management.html" id="purchase-request-button" class="button disabled">구매 요청 상세 보기</a>
            <a href="javascript:history.back()" class="button">뒤로가기</a>
        </div>

        <div class="header">구매 관리</div>

        <!-- 세부 정보 -->
        <div class="details">
            <div><label>업체명</label><input type="text" id="supply" placeholder="업체명을 입력하세요"></div>
            <div><label>거래금</label><input type="text" id="total_price" placeholder="자동 계산됩니다" readonly></div>
            <div><label>배송지</label><input type="text" id="deliveryaddress" placeholder="배송지를 입력하세요"></div>
            <div><label>전화 번호</label><input type="text" id="phone_number" placeholder="전화번호를 입력하세요"></div>
            <div><label>주문 날짜</label><input type="date" id="purchase_date"></div>
        </div>

        <!-- 거래 내역 테이블 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>순번</th>
                        <th>부품 타입</th>
                        <th>품명</th>
                        <th>가격</th>
                        <th>수량</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td>1</td>
                        <td>
                            <select>
                                <option value="CPU">CPU</option>
                                <option value="쿨러/튜닝">쿨러/튜닝</option>
                                <option value="메인보드">메인보드</option>
                                <option value="메모리">메모리</option>
                                <option value="그래픽카드">그래픽카드</option>
                                <option value="SSD">SSD</option>
                                <option value="HDD">HDD</option>
                                <option value="케이스">케이스</option>
                                <option value="파워">파워</option>
                            </select>
                        </td>
                        <td><input type="text" placeholder="품명을 입력하세요"></td>
                        <td><input type="number" placeholder="가격 입력" oninput="updateTotalPrice()"></td>
                        <td><input type="number" placeholder="수량 입력" oninput="updateTotalPrice()"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 행 추가/삭제 버튼 -->
        <div class="row-buttons">
            <div>
                <button class="button" onclick="addRow()">행 추가</button>
                <button class="button" onclick="deleteRow()">행 삭제</button>
            </div>
            <button class="button" onclick="submitData()">요청</button>
        </div>
    </div>

    <script>
        function checkRoleAccess() {
            const role = localStorage.getItem("role");
            const roleDisplay = document.getElementById("role-display");
            const purchaseRequestButton = document.getElementById("purchase-request-button");

            roleDisplay.textContent = `직급: ${role}`;

            if (role === "총 관리자" || role === "구매 관리자") {
                purchaseRequestButton.classList.remove("disabled");
                purchaseRequestButton.onclick = null;
            } else {
                purchaseRequestButton.classList.add("disabled");
                purchaseRequestButton.onclick = (e) => {
                    e.preventDefault();
                    alert("해당 기능에 접근 권한이 없습니다.");
                };
            }
        }

        function addRow() {
            const tableBody = document.getElementById("table-body");
            const rowCount = tableBody.rows.length;
            const newRow = tableBody.insertRow();

            newRow.innerHTML = `
                <td>${rowCount + 1}</td>
                <td>
                    <select>
                        <option value="CPU">CPU</option>
                        <option value="쿨러/튜닝">쿨러/튜닝</option>
                        <option value="메인보드">메인보드</option>
                        <option value="메모리">메모리</option>
                        <option value="그래픽카드">그래픽카드</option>
                        <option value="SSD">SSD</option>
                        <option value="HDD">HDD</option>
                        <option value="케이스">케이스</option>
                        <option value="파워">파워</option>
                    </select>
                </td>
                <td><input type="text" placeholder="품명을 입력하세요"></td>
                <td><input type="number" placeholder="가격 입력" oninput="updateTotalPrice()"></td>
                <td><input type="number" placeholder="수량 입력" oninput="updateTotalPrice()"></td>
            `;
        }

        function deleteRow() {
            const tableBody = document.getElementById("table-body");
            if (tableBody.rows.length > 1) {
                tableBody.deleteRow(-1);
                updateTotalPrice(); // 삭제 후 총 거래금 재계산
            } else {
                alert("최소 한 행은 유지해야 합니다.");
            }
        }

        // 총 거래금 계산 함수
        function updateTotalPrice() {
            const tableBody = document.getElementById("table-body");
            const rows = tableBody.rows;
            let totalPrice = 0;

            // 각 행의 가격과 수량을 가져와 계산
            for (const row of rows) {
                const priceInput = row.cells[3].querySelector("input").value;
                const quantityInput = row.cells[4].querySelector("input").value;

                const price = parseFloat(priceInput) || 0;
                const quantity = parseInt(quantityInput) || 0;

                totalPrice += price * quantity;
            }

            // 총 거래금 필드에 업데이트
            const totalPriceField = document.getElementById("total_price");
            totalPriceField.value = `${totalPrice.toLocaleString()} 원`;
        }

        async function submitData() {
            const supply = document.getElementById("supply").value;
            const deliveryaddress = document.getElementById("deliveryaddress").value;
            const phone_number = document.getElementById("phone_number").value;
            const purchase_date = document.getElementById("purchase_date").value;

            if (!supply || !deliveryaddress || !phone_number || !purchase_date) {
                alert("기본 정보를 모두 입력해주세요.");
                return;
            }

            const tableBody = document.getElementById("table-body");
            const rows = tableBody.rows;

            for (const row of rows) {
                const type = row.cells[1].querySelector("select").value;
                const name = row.cells[2].querySelector("input").value;
                const price = parseFloat(row.cells[3].querySelector("input").value) || 0;
                const quantity = parseInt(row.cells[4].querySelector("input").value) || 0;

                if (!type || !name || price <= 0 || quantity <= 0) {
                    alert("모든 행에 유효한 데이터를 입력해주세요.");
                    return;
                }

                const itemData = {
                    supply,
                    deliveryaddress,
                    phone_number,
                    purchase_date,
                    type,
                    name,
                    total_price: price * quantity,
                    quantity,
                };

                try {
                    const response = await fetch("/api/request/submitRequest", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(itemData),
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        console.log(`항목 저장 성공: ${name}`);
                    } else {
                        console.error(`항목 저장 실패: ${name}`);
                        alert(`항목 저장 실패: ${name}`);
                    }
                } catch (error) {
                    console.error(`오류 발생: ${name}`, error);
                    alert(`오류 발생: ${name}`);
                }
            }

            alert("모든 항목 저장 요청이 완료되었습니다.");
        }
    </script>
</body>
</html>
