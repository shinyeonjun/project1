<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Dashboard</title>
    <style>
        /* 기본적인 스타일링 설정 */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
        }
        /* 상단 헤더 스타일 */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }
        header .headbox{
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header .headbox div{
            width: 30%;
            text-align: left;
        }
        header .headbox nav{
            width: 70%;
            text-align: right;
        }
        .role-display {
            font-size: 16px;
            margin-right: 20px;
        }
        .logout-button {
            padding: 8px 16px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: none; /* 기본적으로 숨김 */
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .dashboard, .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;


        }
        .card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            font-size: 22px;
            color: #333;
        }
        .card button {
            background-color: #4a90e2;
            color            : #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .chart {
            max-width: 100%;
            height: 300px;
            background-color: #ecf0f1;
            border-radius: 10px;
        }
        .footer {
            background-color: #2c3e50;
            color: #ffffff;
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="headbox">
            <div>ERP System</div>
            <nav>
                <span class="role-display" id="role-display">직급: </span>
                <button class="logout-button" onclick="logout()" id="logout-button">로그아웃</button>
            </nav>
        </div>
    </header>

    <!-- 암호 입력창 -->
    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h2>접근을 위해 암호를 입력하세요</h2>
        <input type="password" id="password" placeholder="암호 입력" style="padding: 10px; font-size: 16px;">
        <button onclick="validatePassword()">로그인</button>
    </div>

    <div class="container" id="dashboard-container" style="display: none;">
        <div class="dashboard">
            <div class="card">
                <h2>구매 관리</h2>
                <button onclick="navigate(event, '/static/purchase.html')" class="button" id="purchase-button">상세 보기</button>
            </div>
            <div class="card">
                <h2>판매 관리</h2>
                <button onclick="navigate(event, '/static/order.html')" class="button" id="sales-button">상세 보기</button>
            </div>
            <div class="card">
                <h2>재고 관리</h2>
                <button onclick="navigate(event, '/static/inventory.html')" class="button" id="inventory-button">상세 보기</button>
            </div>
        </div>
        
        <div class="stats-dashboard">
            <div class="card">
                <h2>구매 현황</h2>
                <canvas id="purchaseChart" class="chart"></canvas>
            </div>
            <div class="card">
                <h2>판매 현황</h2>
                <canvas id="salesChart" class="chart"></canvas>
            </div>
            <div class="card">
                <h2>재고 현황</h2>
                <canvas id="inventoryChart" class="chart"></canvas>
            </div>
        </div>
    </div>

    <footer class="footer">
        © 2024 ERP System
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function validatePassword() {
            const password = document.getElementById('password').value;
            const roleDisplay = document.getElementById('role-display');
            const logoutButton = document.getElementById('logout-button');
    
            let role;
    
            switch (password) {
                case '0000': 
                    role = '총 관리자';
                    break;
                case '0101': 
                    role = '구매 관리자';
                    break;
                case '0202': 
                    role = '판매 관리자';
                    break;
                case '0303': 
                    role = '재고 관리자';
                    break;
                case '1111': 
                    role = '구매 관계자';
                    break;
                case '2222': 
                    role = '판매 관계자';
                    break;
                case '3333': 
                    role = '재고 관계자';
                    break;
                default:
                    alert('올바르지 않은 암호입니다.');
                    return;
            }
            
            roleDisplay.textContent = `직급: ${role}`;
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('role', role);

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'block';
            logoutButton.style.display = 'inline-block';
        }

        function navigate(event, url) {
            window.location.href = url;
        }

        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('role');
            location.reload();
        }

        function checkLoginStatus() {
            const loggedIn = localStorage.getItem('loggedIn');
            const role = localStorage.getItem('role');
            const logoutButton = document.getElementById('logout-button');

            if (loggedIn) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
                document.getElementById('role-display').textContent = `직급: ${role}`;
                logoutButton.style.display = 'inline-block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('dashboard-container').style.display = 'none';
                logoutButton.style.display = 'none';
            }
        }

        async function fetchDashboardData() {
            try {
                const purchaseResponse = await fetch('http://localhost:8000/api/purchase_chart');
                const purchaseData = await purchaseResponse.json();
                createPurchaseChart(purchaseData);

                const salesResponse = await fetch('http://localhost:8000/api/sales_chart');
                const salesData = await salesResponse.json();
                createSalesChart(salesData);

                const inventoryResponse = await fetch('http://localhost:8000/api/inventory_chart');
                const inventoryData = await inventoryResponse.json();
                createInventoryChart(inventoryData);
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        }

        function createPurchaseChart(purchaseData) {
            const ctx = document.getElementById('purchaseChart').getContext('2d');
            const labels = purchaseData.map(item => item.date);
            const counts = purchaseData.map(item => item.count);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '배송 중인 구매 수량',
                        data: counts,
                        backgroundColor: 'rgba(75, 192, 192, 0.6)'
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        async function createSalesChart(salesData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const labels = salesData.daily_sales.map(item => item.date);
            const totals = salesData.daily_sales.map(item => item.total_sales);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '일간 매출',
                        data: totals,
                        backgroundColor: 'rgba(75, 192, 192, 0.6)'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '날짜'
                            }
                        },
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '매출 (원)'
                            }
                        }
                    }
                }
            });
        }

        function createInventoryChart(inventoryData) {
            const ctx = document.getElementById('inventoryChart').getContext('2d');
            const labels = inventoryData.map(item => item.type);
            const counts = inventoryData.map(item => item.count);

            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '재고 수량',
                        data: counts,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.6)',
                            'rgba(54, 162, 235, 0.6)',
                            'rgba(255, 206, 86, 0.6)',
                            'rgba(75, 192, 192, 0.6)',
                            'rgba(153, 102, 255, 0.6)',
                            'rgba(255, 159, 64, 0.6)',
                            'rgba(199, 199, 199, 0.6)',
                            'rgba(83, 102, 255, 0.6)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    }
                }
            });
        }

        window.onload = function() {
            checkLoginStatus();
            fetchDashboardData();
        };
    </script>
</body>
</html>
