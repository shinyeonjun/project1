<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Dashboard</title>
    <style>
        /* 기본적인 스타일링 설정 */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
        }
        /* 상단 헤더 스타일 */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }
        header .headbox{
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header .headbox div{
            width: 30%;
            text-align: left;
        }
        header .headbox nav{
            width: 70%;
            text-align: right;
        }

        .role-display {
            font-size: 16px;
            margin-right: 20px;
        }
        .logout-button {
            padding: 8px 16px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: none; /* 기본적으로 숨김 */
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .dashboard, .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            font-size: 22px;
            color: #333;
        }
        .card .value {
            font-size: 36px;
            color: #4a90e2;
            margin: 20px 0;
        }
        .card .description {
            color: #666;
            font-size: 14px;
            margin: 10px 0;
        }
        .card button {
            background-color: #4a90e2;
            color: #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .chart {
            height: 300px;
            background-color: #ecf0f1;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #666;
        }
        .footer {
            background-color: #2c3e50;
            color: #ffffff;
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="headbox">
            <div>ERP System</div>
            <nav>
                <span class="role-display" id="role-display">직급: </span>
                <button class="logout-button" onclick="logout()" id="logout-button">로그아웃</button>
            </nav>
        </div>
    </header>

    <!-- 암호 입력창 -->
    <div id="login-section" style="text-align: center; margin-top: 50px;">
        <h2>접근을 위해 암호를 입력하세요</h2>
        <input type="password" id="password" placeholder="암호 입력" style="padding: 10px; font-size: 16px;">
        <button onclick="validatePassword()">로그인</button>
    </div>

    <div class="container" id="dashboard-container" style="display: none;">
        <div class="dashboard">
            <div class="card">
                <h2>구매 관리</h2>
                <div class="value" id="production-rate">0%</div>
                <div class="description">현재 구매 완료율</div>
                <button onclick="navigate(event, '/static/purchase.html')" class="button" id="purchase-button">상세 보기</button>
            </div>
            <div class="card">
                <h2>판매 관리</h2>
                <div class="value" id="sales-count">0</div>
                <div class="description">이번 달 판매 수량</div>
                <button onclick="navigate(event, '/static/order.html')" class="button" id="sales-button">상세 보기</button>
            </div>
            <div class="card">
                <h2>재고 관리</h2>
                <div class="value" id="inventory-count">0</div>
                <div class="description">현재 재고 수량</div>
                <button onclick="navigate(event, '/static/inventory.html')" class="button" id="inventory-button">상세 보기</button>
            </div>
        </div>
        
        <div class="stats-dashboard">
            <div class="card"><h2>구매 현황</h2><div class="chart">구매 현황 차트</div></div>
            <div class="card"><h2>판매 현황</h2><div class="chart">판매 현황 차트</div></div>
            <div class="card"><h2>재고 현황</h2><div class="chart">재고 현황 차트</div></div>
        </div>
    </div>

    <footer class="footer">
        © 2024 ERP System
    </footer>

    <script>
        function validatePassword() {
            const password = document.getElementById('password').value;
            const roleDisplay = document.getElementById('role-display');
            const logoutButton = document.getElementById('logout-button');
            const purchaseButton = document.getElementById('purchase-button');
            const salesButton = document.getElementById('sales-button');
            const inventoryButton = document.getElementById('inventory-button');
            
            // 기본적으로 모든 버튼을 비활성화
            purchaseButton.disabled = true;
            salesButton.disabled = true;
            inventoryButton.disabled = true;

            let role;

            switch (password) {
                case '0000': 
                    role = '총 관리자';
                    purchaseButton.disabled = false;
                    salesButton.disabled = false;
                    inventoryButton.disabled = false;
                    break;
                case '0101': 
                    role = '구매 관리자';
                    purchaseButton.disabled = false;
                    break;
                case '0202': 
                    role = '판매 관리자';
                    salesButton.disabled = false;
                    break;
                case '0303': 
                    role = '재고 관리자';
                    inventoryButton.disabled = false;
                    break;
                case '1111': 
                    role = '구매 관계자';
                    purchaseButton.disabled = false;
                    break;
                case '2222': 
                    role = '판매 관계자';
                    salesButton.disabled = false;
                    break;
                case '3333': 
                    role = '재고 관계자';
                    inventoryButton.disabled = false;
                    break;
                default:
                    alert('올바르지 않은 암호입니다.');
                    return;
            }
            
            roleDisplay.textContent = `직급: ${role}`;
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('role', role);

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'block';
            logoutButton.style.display = 'inline-block';
        }

        function navigate(event, url) {
            const button = event.target;
            if (!button.disabled) {
                window.location.href = url;
            }
        }

        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('role');
            location.reload();
        }

        function checkLoginStatus() {
            const loggedIn = localStorage.getItem('loggedIn');
            const role = localStorage.getItem('role');
            const logoutButton = document.getElementById('logout-button');
            const purchaseButton = document.getElementById('purchase-button');
            const salesButton = document.getElementById('sales-button');
            const inventoryButton = document.getElementById('inventory-button');

            // 기본적으로 모든 버튼을 비활성화
            purchaseButton.disabled = true;
            salesButton.disabled = true;
            inventoryButton.disabled = true
            if (loggedIn) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
                document.getElementById('role-display').textContent = `직급: ${role}`;
                logoutButton.style.display = 'inline-block';

                // 역할에 따른 버튼 활성화 상태 설정
                switch (role) {
                    case '총 관리자':
                        purchaseButton.disabled = false;
                        salesButton.disabled = false;
                        inventoryButton.disabled = false;
                        break;
                    case '구매 관리자':
                    case '구매 관계자':
                        purchaseButton.disabled = false;
                        break;
                    case '판매 관리자':
                    case '판매 관계자':
                        salesButton.disabled = false;
                        break;
                    case '재고 관리자':
                    case '재고 관계자':
                        inventoryButton.disabled = false;
                        break;
                }
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('dashboard-container').style.display = 'none';
                logoutButton.style.display = 'none';
            }
        }
        
        // FastAPI로부터 데이터를 가져와서 대시보드에 표시하는 함수
        async function fetchDashboardData() {
            try {
                // API 요청을 통해 데이터 가져오기
                const response = await fetch('http://localhost:8000/api/dashboard');
                const data = await response.json();

                // 가져온 데이터를 HTML 요소에 반영
                document.getElementById('production-rate').innerText = data.production_rate + '%';
                document.getElementById('sales-count').innerText = data.sales_count;
                document.getElementById('inventory-count').innerText = data.inventory_count;
            } catch (error) {
                // 오류 발생 시 콘솔에 에러 메시지 출력
                console.error('Error fetching dashboard data:', error);
            }
        }

        // 페이지 로드 시 로그인 상태와 대시보드 데이터를 동시에 체크
        window.onload = function() {
            checkLoginStatus();
            fetchDashboardData();
        };
    </script>
</body>
</html>
