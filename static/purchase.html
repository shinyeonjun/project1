<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승인된 구매 목록</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9f0f5;
            margin: 0;
            padding: 0;
            /* 화면 전체를 Flex 컨테이너로 설정 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 수직 가운데 정렬을 위해 최소 높이 설정 */
        }

        .container {
            width: 90%;
            max-width: 1200px; /* 최대 너비 확장 */
            background-color: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            /* 화면에 따라 스크롤이 필요한 경우를 위해 최대 높이 설정 */
            max-height: 90vh;
            overflow: hidden; /* 전체 컨테이너 스크롤 비활성화 */
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            text-align: center;
        }

        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4a90e2;
            color: #ffffff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #357ab8;
        }

        .table-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: auto; /* 내용이 넘칠 경우 스크롤 */
            margin-top: 20px;
            background-color: #f9f9f9;
            max-height: 60vh; /* 필요에 따라 조정 */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 고정 레이아웃 사용 */
        }

        th, td {
            padding: 15px 10px;
            text-align: center;
            font-size: 14px;
            word-wrap: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            background-color: #4a90e2;
            color: #ffffff;
            font-weight: bold;
        }

        td {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
        }

        /* 품명 컬럼 스타일 */
        th:nth-child(4), td:nth-child(4) { /* '품명' 컬럼 */
            width: 25%; /* 필요에 따라 조정 */
            white-space: normal; /* 줄 바꿈 허용 */
            word-break: break-word; /* 단어 단위로 분리 */
        }

        /* 작업 컬럼 스타일 */
        th:nth-child(9), td:nth-child(9) { /* '작업' 컬럼 */
            width: 10%; /* 필요에 따라 조정 */
            white-space: nowrap;
        }

        .empty-message {
            font-size: 14px;
            color: #666;
            padding: 20px;
            text-align: center;
        }

        /* 버튼 공통 스타일 */
        .button {
            background-color: #4a90e2;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        /* 구매 요청 및 승인 목록 버튼 */
        .large-button {
            padding: 12px 24px;
            font-size: 16px;
        }

        .large-button:hover {
            background-color: #357ab8;
        }

        /* 배송 완료 버튼 */
        .small-button {
            padding: 6px 12px;
            font-size: 12px;
        }

        .small-button:hover {
            background-color: #357ab8;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            flex-wrap: wrap; /* 버튼이 화면 크기에 따라 줄 바꿈 */
            gap: 10px;
        }

        /* 모달 스타일 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* 더 어두운 반투명 배경 */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #fff;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 1200px; /* 모달 크기 조정 */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.3s ease-in-out;
            overflow: hidden; /* 모달 내부 스크롤 비활성화 */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 20px;
            color: #333;
        }

        .modal-close {
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal .table-container {
            max-height: 50vh; /* 필요에 따라 조정 */
            overflow: auto; /* 모달 내에서 스크롤 가능 */
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 10px 5px;
            }

            .header {
                font-size: 20px;
            }

            .back-button {
                padding: 6px 12px;
                font-size: 12px;
            }

            .button-container {
                flex-direction: column;
                align-items: stretch;
            }

            .large-button {
                width: 100%;
            }

            /* 품명 컬럼 폰트 크기 조정 */
            th:nth-child(4), td:nth-child(4) {
                font-size: 12px;
            }
        }
    </style>
</head>
<body onload="loadApprovedPurchases()">
    <div class="container">
        <a href="javascript:history.back()" class="back-button">뒤로가기</a>
        <div class="header">승인된 구매 목록</div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>요청 ID</th>
                        <th>업체명</th>
                        <th>부품 타입</th>
                        <th>품명</th>
                        <th>수량</th>
                        <th>상태</th>
                        <th>총 가격</th>
                        <th>구매 날짜</th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="approved-purchase-table">
                    <tr>
                        <td colspan="9" class="empty-message">데이터를 불러오는 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="button-container">
            <a href="purchase_request.html" class="button large-button">구매 요청</a>
            <button class="button large-button" onclick="showModal()">승인 목록</button>
        </div>
    </div>

    <!-- 모달 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>승인 대기중인 요청</h2>
                <span class="modal-close" onclick="closeModal()">×</span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>요청 ID</th>
                            <th>업체명</th>
                            <th>부품 타입</th>
                            <th>품명</th>
                            <th>수량</th>
                            <th>총 가격</th>
                            <th>배송지</th>
                            <th>전화번호</th>
                        </tr>
                    </thead>
                    <tbody id="pending-purchase-table">
                        <tr>
                            <td colspan="8" class="empty-message">데이터를 불러오는 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadApprovedPurchases() {
            const tableBody = document.getElementById("approved-purchase-table");

            try {
                const response = await fetch("/api/purchase/getApprovedPurchases");
                const data = await response.json();

                if (!data.success) {
                    tableBody.innerHTML = `<tr><td colspan="9" class="empty-message">${data.error}</td></tr>`;
                    return;
                }

                if (data.purchases.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="9" class="empty-message">현재 승인된 구매 내역이 없습니다.</td></tr>`;
                } else {
                    tableBody.innerHTML = "";
                    data.purchases.forEach((purchase) => {
                        const statusText = purchase.status === 1 ? "배송 중" : "완료";

                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${purchase.purchase_id}</td>
                            <td>${purchase.supply}</td>
                            <td>${purchase.type || "미등록"}</td>
                            <td>${purchase.name || "미등록"}</td>
                            <td>${purchase.quantity}</td>
                            <td>${statusText}</td>
                            <td>${Number(purchase.total_price).toLocaleString()}원</td>
                            <td>${new Date(purchase.purchase_date).toLocaleDateString()}</td>
                            ${
                                purchase.status === 1
                                    ? `<td><button class="button small-button" onclick="markAsCompleted(${purchase.purchase_id})">배송 완료</button></td>`
                                    : `<td>-</td>`
                            }
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tableBody.innerHTML = `<tr><td colspan="9" class="empty-message">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
            }
        }

        async function loadPendingPurchases() {
            const tableBody = document.getElementById("pending-purchase-table");

            try {
                const response = await fetch("/api/purchase/getPendingPurchases");
                const data = await response.json();

                if (!data.success) {
                    tableBody.innerHTML = `<tr><td colspan="8" class="empty-message">${data.error}</td></tr>`;
                    return;
                }

                if (data.purchases.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="8" class="empty-message">현재 승인 대기중인 요청이 없습니다.</td></tr>`;
                } else {
                    tableBody.innerHTML = "";
                    data.purchases.forEach((purchase) => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${purchase.purchase_id}</td>
                            <td>${purchase.supply}</td>
                            <td>${purchase.type || "미등록"}</td>
                            <td>${purchase.name || "미등록"}</td>
                            <td>${purchase.quantity}</td>
                            <td>${Number(purchase.total_price).toLocaleString()}원</td>
                            <td>${purchase.deliveryaddress || "미등록"}</td>
                            <td class="phone-number">${purchase.phone_number || "미등록"}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tableBody.innerHTML = `<tr><td colspan="8" class="empty-message">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
            }
        }

        function showModal() {
            document.getElementById("modal").style.display = "flex";
            loadPendingPurchases();
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        async function markAsCompleted(purchaseId) {
            try {
                const response = await fetch(`/api/purchase/markAsCompleted`, {
                    method: "POST", // POST 요청
                    headers: {
                        "Content-Type": "application/json", // JSON 형식 지정
                    },
                    body: JSON.stringify({ purchase_id: purchaseId }), // JSON 데이터 전송
                });

                // HTTP 상태 코드 확인
                if (!response.ok) {
                    const errorDetails = await response.json(); // 서버에서 반환된 오류 세부사항
                    console.error("서버 응답 오류:", errorDetails);
                    throw new Error(
                        `HTTP 상태 오류: ${response.status} - ${
                            errorDetails.detail || JSON.stringify(errorDetails)
                        }`
                    );
                }

                // 성공적인 응답 처리
                const data = await response.json();
                if (data.success) {
                    alert("배송이 완료되었습니다. 해당 데이터가 item 테이블로 이동했습니다.");
                    loadApprovedPurchases(); // 테이블 데이터 갱신
                } else {
                    alert(`서버에서 반환된 오류: ${data.error}`);
                }
            } catch (error) {
                // 오류 핸들링
                console.error("배송 완료 처리 중 오류 발생:", error);
                alert(`요청 처리 중 문제가 발생했습니다: ${error.message}`);
            }
        }
    </script>
</body>
</html>
