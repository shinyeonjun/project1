<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승인된 구매 목록</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9f0f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background-color: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            text-align: center;
        }

        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4a90e2;
            color: #ffffff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #357ab8;
        }

        .table-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 15px 10px;
            text-align: center;
            font-size: 14px;
            word-wrap: break-word;
        }

        th {
            background-color: #4a90e2;
            color: #ffffff;
            font-weight: bold;
        }

        td {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
        }

        .empty-message {
            font-size: 14px;
            color: #666;
            padding: 20px;
            text-align: center;
        }

        .button {
            background-color: #4a90e2;
            color: #ffffff;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }

        .button:hover {
            background-color: #357ab8;
        }

        /* 버튼 컨테이너 스타일 */
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        /* 모달 창 스타일 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .modal-close {
            float: right;
            cursor: pointer;
            color: #999;
            font-size: 20px;
        }

        .modal-close:hover {
            color: #000;
        }
    </style>
</head>
<body onload="loadApprovedPurchases()">
    <div class="container">
        <a href="javascript:history.back()" class="back-button">뒤로가기</a>
        <div class="header">승인된 구매 목록</div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>요청 ID</th>
                        <th>업체명</th>
                        <th>품명</th>
                        <th>수량</th>
                        <th>상태</th>
                        <th>총 가격</th>
                        <th>구매 날짜</th>
                    </tr>
                </thead>
                <tbody id="approved-purchase-table">
                    <tr>
                        <td colspan="7" class="empty-message">데이터를 불러오는 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 버튼 컨테이너 -->
        <div class="button-container">
            <a href="purchase_request.html" class="button">구매 요청</a>
            <button class="button" onclick="showModal()">승인 목록</button>
        </div>
    </div>

    <!-- 모달 창 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">×</span>
            <h2>승인 대기중인 요청</h2>
            <table>
                <thead>
                    <tr>
                        <th>요청 ID</th>
                        <th>업체명</th>
                        <th>품명</th>
                        <th>수량</th>
                        <th>총 가격</th>
                        <th>배송지</th>
                        <th>전화번호</th>
                    </tr>
                </thead>
                <tbody id="pending-purchase-table">
                    <tr>
                        <td colspan="7" class="empty-message">데이터를 불러오는 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadApprovedPurchases() {
            const tableBody = document.getElementById("approved-purchase-table");

            try {
                const response = await fetch("/api/purchase/getApprovedPurchases");
                const data = await response.json();

                if (!data.success) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">${data.error}</td></tr>`;
                    return;
                }

                if (data.purchases.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">현재 승인된 구매 내역이 없습니다.</td></tr>`;
                } else {
                    tableBody.innerHTML = ""; // 기존 데이터를 초기화
                    data.purchases.forEach((purchase) => {
                        const row = document.createElement("tr");
                        const statusText = purchase.status === 0 ? "배송 중" : "완료";

                        row.innerHTML = `
                            <td>${purchase.purchase_id}</td>
                            <td>${purchase.supply}</td>
                            <td>${purchase.name || "미등록"}</td>
                            <td>${purchase.quantity}</td>
                            <td>${statusText}</td>
                            <td>${purchase.total_price.toLocaleString()}원</td>
                            <td>${new Date(purchase.purchase_date).toLocaleDateString()}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">데이터를 불러오는 중 오류가 발생했습니다. 연결 상태를 확인해주세요.</td></tr>`;
            }
        }

        async function loadPendingPurchases() {
            const tableBody = document.getElementById("pending-purchase-table");

            try {
                const response = await fetch("/api/purchase/getPendingPurchases");
                const data = await response.json();

                if (!data.success) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">${data.error}</td></tr>`;
                    return;
                }

                if (data.purchases.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">현재 승인 대기중인 요청이 없습니다.</td></tr>`;
                } else {
                    tableBody.innerHTML = ""; // 기존 데이터를 초기화
                    data.purchases.forEach((purchase) => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${purchase.purchase_id}</td>
                            <td>${purchase.supply}</td>
                            <td>${purchase.name || "미등록"}</td>
                            <td>${purchase.quantity}</td>
                            <td>${purchase.total_price.toLocaleString()}원</td>
                            <td>${purchase.deliveryaddress || "미등록"}</td>
                            <td>${purchase.phone_number || "미등록"}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tableBody.innerHTML = `<tr><td colspan="7" class="empty-message">데이터를 불러오는 중 오류가 발생했습니다. 연결 상태를 확인해주세요.</td></tr>`;
            }
        }

        function showModal() {
            document.getElementById("modal").style.display = "flex";
            loadPendingPurchases(); // 모달 열릴 때 데이터 로드
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>
</body>
</html>
