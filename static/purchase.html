<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구매 관리 상세 보기</title>
    <style>
        /* 전체적인 페이지 설정 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9f0f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* UI 전체를 감싸는 컨테이너 */
        .container {
            width: 80%;
            max-width: 850px;
            background-color: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 30px;
            position: relative;
            margin: 20px;
        }

        /* 제목 섹션 */
        .header {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: left;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
            color: #333;
        }
        
        /* 메인으로 돌아가기 버튼 */
        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4a90e2;
            color: #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: #357ab8;
        }

        /* 세부 정보 그리드 레이아웃 */
        .details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 15px;
            margin-bottom: 25px;
        }

        /* 각 입력 영역 스타일 */
        .details div {
            display: flex;
            flex-direction: column;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9fbfc;
        }

        /* 입력 항목 레이블 */
        .details label {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        /* 입력 필드 스타일 */
        .details input, .details select {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        .details input:focus, .details select:focus {
            border-color: #4a90e2;
        }

        /* 테이블 스타일 */
        .table-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* 테이블 헤더 스타일 */
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        th {
            background-color: #f0f0f0;
            color: #333;
            font-weight: 600;
        }

        /* 행 추가, 행 삭제 버튼 스타일 */
        .row-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .button {
            background-color: #4a90e2;
            color: #ffffff;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #357ab8;
        }

        /* 하단 저장 및 취소 버튼 스타일 */
        .footer {
            margin-top: 20px;
            text-align: right;
        }

    </style>
</head>
<body>

    <!-- 메인 컨테이너 시작 -->
    <div class="container">
        <div class="header">구매 관리</div>
        <a href="main.html" class="back-button">메인으로 돌아가기</a>

        <!-- 세부 정보 영역 -->
        <div class="details">
            <div><label>업체명</label><input type="text" id="companyName" placeholder="업체명을 입력하세요"></div>
            <div><label>거래금</label><input type="number" id="transactionAmount" placeholder="거래 금액을 입력하세요"></div>
            <div><label>상태구분</label><select id="status"><option value="미완료">미완료</option><option value="완료">완료</option></select></div>
            <div><label>배송지</label><input type="text" id="deliveryAddress" placeholder="배송지를 입력하세요"></div>
            <div><label>전화 번호</label><input type="text" id="phoneNumber" placeholder="전화번호를 입력하세요"></div>
            <div><label>주문 날짜</label><input type="date" id="orderDate"></div>
        </div>

        <!-- 거래 내역 테이블 -->
        <div class="table-container">
            <table>
                <thead><tr><th>순번</th><th>품명</th><th>가격</th><th>수량</th><th>업체명</th><th>비고</th></tr></thead>
                <tbody id="table-body"><tr>
                    <td>1</td>
                    <td><input type="text" placeholder="품명을 입력하세요"></td>
                    <td><input type="number" placeholder="가격 입력"></td>
                    <td><input type="number" placeholder="수량 입력"></td>
                    <td><input type="text" placeholder="업체명 입력"></td>
                    <td><input type="text" placeholder="비고 입력"></td>
                </tr></tbody>
            </table>
        </div>

        <div class="row-buttons">
            <button class="button" onclick="addRow()">행 추가</button>
            <button class="button" onclick="deleteRow()">행 삭제</button>
        </div>

        <div class="footer">
            <button class="button" onclick="submitData()">저장</button>
            <button class="button">취소</button>
        </div>
    </div>

    <script>
        function addRow() {
            const tableBody = document.getElementById("table-body");
            const rowCount = tableBody.rows.length;
            const newRow = tableBody.insertRow();

            newRow.innerHTML = `
                <td>${rowCount + 1}</td>
                <td><input type="text" placeholder="품명을 입력하세요"></td>
                <td><input type="number" placeholder="가격 입력"></td>
                <td><input type="number" placeholder="수량 입력"></td>
                <td><input type="text" placeholder="업체명 입력"></td>
                <td><input type="text" placeholder="비고 입력"></td>
            `;
        }

        function deleteRow() {
            const tableBody = document.getElementById("table-body");
            const rowCount = tableBody.rows.length;
            if (rowCount > 1) { // 최소 한 행은 남겨두기
                tableBody.deleteRow(rowCount - 1);
            } else {
                alert("더 이상 삭제할 수 없습니다.");
            }
        }

        async function submitData() {
            const purchaseData = {
                companyName: document.getElementById("companyName").value,
                transactionAmount: document.getElementById("transactionAmount").value,
                status: document.getElementById("status").value,
                deliveryAddress: document.getElementById("deliveryAddress").value,
                phoneNumber: document.getElementById("phoneNumber").value,
                orderDate: document.getElementById("orderDate").value,
                items: []
            };

            // 테이블 데이터 수집
            const tableBody = document.getElementById("table-body");
            for (const row of tableBody.rows) {
                const item = {
                    name: row.cells[1].querySelector("input").value,
                    price: row.cells[2].querySelector("input").value,
                    quantity: row.cells[3].querySelector("input").value,
                    supplier: row.cells[4].querySelector("input").value,
                    remarks: row.cells[5].querySelector("input").value,
                };
                purchaseData.items.push(item);
            }

            // 데이터 전송
            try {
                const response = await fetch("/api/purchase", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(purchaseData)
                });
                const result = await response.json();
                if (result.success) {
                    alert("저장 성공");
                } else {
                    alert("저장 실패");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("저장 중 오류 발생");
            }
        }
    </script>
</body>
</html>
